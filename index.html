<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Move Lover</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="//libtl.com/sdk.js" data-zone="10799185" data-sdk="show_10799185"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Roboto', Arial, sans-serif; background: #0f0f0f; color: #fff; overflow-x: hidden; }

    .header { background: #000; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header-left h1 { font-size: 20px; font-weight: 700; }
    .xtube { background: #ff0000; color: #fff; padding: 2px 8px; border-radius: 3px; font-size: 13px; font-weight: 500; }
    .profile { display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .profile img, .profile div.default-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #ff0000; object-fit: cover; background: #333; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; }

    .category-bar { display: flex; gap: 10px; padding: 10px 8px; overflow-x: auto; background: #1a1a1a; white-space: nowrap; scrollbar-width: none; }
    .category-chip { padding: 8px 16px; background: #333; color: #fff; border-radius: 30px; font-size: 14px; cursor: pointer; white-space: nowrap; }
    .category-chip.active { background: #ff0000; }

    .video-list { padding: 10px 8px 90px; }
    .video-item { background: #1a1a1a; margin-bottom: 15px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; cursor: pointer; }
    .video-item img { width: 100%; height: 200px; object-fit: cover; }
    .video-info { padding: 12px; }
    .video-title { font-size: 16px; font-weight: 500; line-height: 1.3; margin-bottom: 6px; }
    .video-meta { font-size: 13px; color: #aaa; display: flex; align-items: center; gap: 8px; }
    .hd-tag { background: rgba(255,255,255,0.2); padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 700; }
    .premium-overlay { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.85); color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }

    .telegram-float { position: fixed; bottom: 20px; right: 20px; width: 52px; height: 52px; background: #229ed9; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 18px rgba(34,158,217,0.5); z-index: 999; text-decoration: none; overflow: hidden; }
    .telegram-float img { width: 36px; height: 36px; }

    .options { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .options-content { background: #1f1f1f; width: 92%; max-width: 400px; border-radius: 12px; overflow: hidden; }
    .modal-header { padding: 15px; text-align: center; border-bottom: 1px solid #333; }
    .modal-thumb { width: 100%; height: 220px; object-fit: cover; }
    .modal-body { padding: 15px; text-align: center; }
    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .ad-status { background: #222; padding: 10px; border-radius: 8px; margin: 15px 0; font-size: 15px; font-weight: 500; }
    .watch-ad-btn, .play-now-btn { background: #ff0000; color: #fff; border: none; width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
    .video-unlocked { background: #00c853; color: #fff; padding: 12px; border-radius: 8px; margin: 10px 0; font-weight: 600; display: none; }
    .modal-footer { display: flex; padding: 12px 15px; background: #181818; gap: 12px; }
    .like-btn { flex: 1; background: #25D366; color: #fff; border: none; padding: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; }
    .share-btn { flex: 1; background: #0084FF; color: #fff; border: none; padding: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; }

    .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 3000; }
    .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #ff0000; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; padding: 20px; overflow-y: auto; display: none; }

    /* Bottom Share Sheet */
    .share-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1f1f1f; border-radius: 16px 16px 0 0; padding: 20px 15px 30px; transition: bottom 0.4s ease; z-index: 2500; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
    .share-sheet.show { bottom: 0; }
    .share-sheet h3 { text-align: center; margin-bottom: 20px; color: #aaa; }
    .share-icons { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 15px; }
    .share-icon { text-align: center; cursor: pointer; width: 70px; }
    .share-icon img { width: 55px; height: 55px; border-radius: 50%; margin-bottom: 8px; object-fit: cover; }
    .share-icon span { font-size: 13px; display: block; }
  </style>
</head>
<body>

  <div class="header" id="header">
    <div class="header-left">
      <h1>Move Lover</h1>
      <div class="xtube">Xtube</div>
    </div>
    <div class="profile" id="profileSection"></div>
  </div>

  <div class="category-bar" id="categoryBar"></div>
  <div class="video-list" id="videoList"></div>

  <a href="#" id="telegramFloat" class="telegram-float">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Telegram_logo.svg/512px-Telegram_logo.svg.png" alt="Telegram">
  </a>

  <!-- Options Modal -->
  <div class="options" id="optionsModal">
    <div class="options-content">
      <div class="modal-header"><h2 class="modal-title" id="modalTitle"></h2></div>
      <img id="modalThumb" class="modal-thumb" src="" alt="">
      <div class="modal-body">
        <div id="adStatus" class="ad-status">Watch ads to unlock</div>
        <div id="unlockedMessage" class="video-unlocked">✅ Video Unlocked</div>
        <button id="watchAdBtn" class="watch-ad-btn">Watch Ad to Unlock (0/4)</button>
        <button id="playNowBtn" class="play-now-btn">▶ Watch Video Now</button>
      </div>
      <div class="modal-footer">
        <button id="likeBtn" class="like-btn">👍 <span id="likeCount">17</span></button>
        <button id="shareBtn" class="share-btn">↗ Share</button>
      </div>
      <button onclick="closeModal()" style="width:100%; background:#333; color:#fff; border:none; padding:14px; font-size:16px;">Close</button>
    </div>
  </div>

  <!-- Bottom Share Sheet -->
  <div class="share-sheet" id="shareSheet">
    <h3>Share via</h3>
    <div class="share-icons">
      <div class="share-icon" onclick="shareTo('wa')"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/512px-WhatsApp.svg.png" alt="WA"><span>WhatsApp</span></div>
      <div class="share-icon" onclick="shareTo('ig')"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_icon.png/512px-Instagram_icon.png" alt="IG"><span>Instagram</span></div>
      <div class="share-icon" onclick="shareTo('fb')"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Facebook_f_logo_%282019%29.svg/512px-Facebook_f_logo_%282019%29.svg.png" alt="FB"><span>Messenger</span></div>
      <div class="share-icon" onclick="shareTo('tg')"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Telegram_logo.svg/512px-Telegram_logo.svg.png" alt="TG"><span>Telegram</span></div>
      <div class="share-icon" onclick="copyLink()"><img src="https://cdn-icons-png.flaticon.com/512/1620/1620339.png" alt="Copy"><span>Copy Link</span></div>
    </div>
    <button onclick="closeShareSheet()" style="margin-top:25px; width:100%; background:#333; color:#fff; border:none; padding:14px; border-radius:8px;">Cancel</button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading"><div class="spinner"></div></div>

  <!-- Admin Panel -->
  <div class="admin-panel" id="adminPanel">
    <div style="text-align:center; margin-bottom:20px;">
      <h2>Admin Panel</h2>
      <p style="color:#aaa; margin-top:8px;">Enter Password</p>
      <input type="password" id="adminPassword" placeholder="Enter Password" style="width:80%; padding:12px; margin:15px 0; background:#1f1f1f; border:1px solid #444; border-radius:8px; color:#fff; font-size:16px;">
      <button onclick="checkPassword()" style="background:#ff0000; color:#fff; border:none; padding:12px 30px; border-radius:8px; font-size:16px;">Unlock Admin</button>
    </div>
    
    <div id="adminContent" style="display:none;">
      <h3 style="margin:20px 0 10px;">Telegram Channel Link</h3>
      <input type="text" id="telegramLinkInput" placeholder="https://t.me/YourChannel" style="width:100%; padding:12px; margin-bottom:15px; background:#1f1f1f; border:1px solid #444; border-radius:8px; color:#fff;">

      <h3>Add New Category</h3>
      <input type="text" id="newCategory" placeholder="New Category Name" style="width:100%; padding:12px; margin-bottom:8px; background:#1f1f1f; border:1px solid #444; border-radius:8px; color:#fff;">
      <button onclick="addCategory()" style="background:#00c853; color:#000; width:100%; padding:12px; border:none; border-radius:8px; margin-bottom:20px;">Add Category</button>

      <h3 style="margin:25px 0 10px;">Add / Edit Video</h3>
      <input type="text" id="newTitle" placeholder="Video Title" style="width:100%; padding:12px; margin-bottom:8px; background:#1f1f1f; border:1px solid #444; border-radius:8px; color:#fff;">
      <select id="newCategorySelect" style="width:100%; padding:12px; margin-bottom:8px; background:#1f1f1f; border:1px solid #444; border-radius:8px; color:#fff;"></select>
      <input type="text" id="newLink" placeholder="Direct MP4 Link" style="width:100%; padding:12px; margin-bottom:8px; background:#1f1f1f; border:1px solid #444; border-radius:8px; color:#fff;">
      <input type="text" id="newThumb" placeholder="Thumbnail URL" style="width:100%; padding:12px; margin-bottom:8px; background:#1f1f1f; border:1px solid #444; border-radius:8px; color:#fff;">
      <button onclick="addVideo()" style="background:#00c853; color:#000; width:100%; padding:14px; border:none; border-radius:8px; font-weight:700;">Save Video</button>

      <h3 style="margin-top:30px;">Existing Categories</h3>
      <div id="adminCategoryList"></div>

      <h3 style="margin-top:30px;">Existing Videos</h3>
      <div id="adminVideoList"></div>

      <button onclick="closeAdmin()" style="margin-top:30px; background:#ff0000; color:#fff; width:100%; padding:12px; border:none; border-radius:8px;">Close Admin</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const ADMIN_PASSWORD = "153781";
    const BIN_ID = "69cb78f8aaba882197ad9f65";
    const MASTER_KEY = "$2a$10$mr0rpThgZSw.qns0mo/jEerdTDBeZVCCQEadGMUTo0CBCMbCMZ1Gm";

    let videos = [];
    let categories = [];
    let currentFilter = "All";
    let currentVideo = null;
    let adCount = 0;
    let telegramJoinLink = "https://t.me/movi_lover_0";
    let editingIndex = -1;

    function timeAgo(timestamp) {
      if (!timestamp) return "Just now";
      const seconds = Math.floor((Date.now() - timestamp) / 1000);
      if (seconds < 60) return "Just now";
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return minutes + " min ago";
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return hours + " hour ago";
      const days = Math.floor(hours / 24);
      return days + " day ago";
    }

    async function loadData() {
      document.getElementById('loading').style.display = 'flex';
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
          headers: { "X-Master-Key": MASTER_KEY }
        });
        const data = await res.json();
        const record = data.record || {};
        videos = record.videos || [];

        // পুরনো ভিডিওগুলোর ভিউজ সেট করা
        videos.forEach((v, index) => {
          if (!v.uploadTime) v.uploadTime = Date.now() - (14 * 24 * 60 * 60 * 1000);
          if (!v.views || v.views === "0") {
            if (index === 0) v.views = "5000";
            else if (index === 1) v.views = "3000";
            else v.views = "1500";
          }
        });

        categories = record.categories || ["নাটক", "মুভি", "সিরিজ", "ভাইরাল"];
      } catch (e) {
        console.log("JSONBin লোড হয়নি");
      }
      document.getElementById('loading').style.display = 'none';
      renderCategoryBar();
      renderVideos();
    }

    async function saveData() {
      try {
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
          body: JSON.stringify({ videos, categories })
        });
      } catch (e) {
        console.log("সেভ করতে সমস্যা");
      }
    }

    function loadUserProfile() {
      const user = tg.initDataUnsafe?.user || {};
      const profileHTML = document.getElementById('profileSection');
      let avatarHTML = user.photo_url 
        ? `<img src="\( {user.photo_url}" alt=" \){user.first_name || ''}">` 
        : `<div class="default-avatar">👨‍❤️‍👨</div>`;
      const name = user.first_name ? user.first_name : 'User';
      profileHTML.innerHTML = avatarHTML + '<div><strong>' + name + '</strong></div>';
    }

    function renderCategoryBar() {
      const bar = document.getElementById('categoryBar');
      bar.innerHTML = `<div class="category-chip ${currentFilter === 'All' ? 'active' : ''}" onclick="filterCategory('All')">All</div>`;
      categories.forEach(cat => {
        bar.innerHTML += `<div class="category-chip \( {currentFilter === cat ? 'active' : ''}" onclick="filterCategory(' \){cat}')">${cat}</div>`;
      });
    }

    function filterCategory(cat) {
      currentFilter = cat;
      renderCategoryBar();
      renderVideos();
    }

    function renderVideos() {
      const container = document.getElementById('videoList');
      container.innerHTML = '';
      const filtered = currentFilter === 'All' ? videos : videos.filter(v => v.category === currentFilter);
      filtered.forEach(video => {
        const div = document.createElement('div');
        div.className = 'video-item';
        const uploadTime = video.uploadTime ? timeAgo(video.uploadTime) : "Just now";
        div.innerHTML = `
          <img src="${video.thumb || 'https://picsum.photos/id/1015/600/340'}" alt="">
          <div class="premium-overlay">🔒 PREMIUM</div>
          <div class="video-info">
            <div class="video-title">${video.title}</div>
            <div class="video-meta">
              <span>Xtube</span>
              <span>${video.views || '0'} views</span>
              <span>• ${uploadTime}</span>
              <span class="hd-tag">HD</span>
            </div>
          </div>
        `;
        div.onclick = () => openOptions(video);
        container.appendChild(div);
      });
    }

    function openOptions(video) {
      currentVideo = video;
      adCount = 0;
      document.getElementById('modalTitle').textContent = video.title;
      document.getElementById('modalThumb').src = video.thumb || 'https://picsum.photos/id/1015/600/340';
      document.getElementById('adStatus').innerHTML = `Watch ads to unlock<br><strong>Unlock Step 0 / 4</strong>`;
      document.getElementById('watchAdBtn').style.display = 'block';
      document.getElementById('playNowBtn').style.display = 'none';
      document.getElementById('unlockedMessage').style.display = 'none';
      document.getElementById('likeCount').textContent = video.likes || 17;
      document.getElementById('optionsModal').style.display = 'flex';
    }

    window.closeModal = () => document.getElementById('optionsModal').style.display = 'none';

    document.getElementById('watchAdBtn').onclick = () => {
      adCount++;
      document.getElementById('adStatus').innerHTML = `Unlock Step ${adCount} / 4`;

      if (adCount === 1) alert("✅ Step 1 Done!");
      else if (adCount === 2) alert("✅ Step 2 Done!");
      else if (adCount === 3) alert("✅ Step 3 Done!");
      else if (adCount === 4) {
        alert("✅ All Steps Completed!\nVideo Unlocked");
        document.getElementById('watchAdBtn').style.display = 'none';
        document.getElementById('unlockedMessage').style.display = 'block';
        document.getElementById('playNowBtn').style.display = 'block';
        return;
      }

      if (typeof window.show_10799185 === 'function') window.show_10799185();
    };

    document.getElementById('playNowBtn').onclick = () => {
      if (currentVideo && currentVideo.link) {
        closeModal();
        window.open(currentVideo.link, '_blank');
      } else alert('ভিডিও লিংক সেট করা হয়নি');
    };

    document.getElementById('likeBtn').onclick = () => {
      if (currentVideo) {
        currentVideo.likes = (currentVideo.likes || 17) + 1;
        document.getElementById('likeCount').textContent = currentVideo.likes;
        saveData();
      }
    };

    // Share Sheet
    document.getElementById('shareBtn').onclick = () => {
      if (!currentVideo) return;
      document.getElementById('shareSheet').classList.add('show');
    };

    function closeShareSheet() {
      document.getElementById('shareSheet').classList.remove('show');
    }

    function shareTo(type) {
      if (!currentVideo) return;
      const text = encodeURIComponent(currentVideo.title);
      const baseUrl = window.location.href.split('?')[0];
      const uniqueUrl = `\( {baseUrl}?v= \){currentVideo.id || Date.now()}`;
      closeShareSheet();

      if (type === 'wa') window.open(`https://wa.me/?text=\( {text}%20 \){encodeURIComponent(uniqueUrl)}`, '_blank');
      else if (type === 'ig') window.open('https://www.instagram.com/', '_blank');
      else if (type === 'fb') window.open(`https://www.facebook.com/sharer/sharer.php?u=\( {encodeURIComponent(uniqueUrl)}&quote= \){text}`, '_blank');
      else if (type === 'tg') window.open(`https://t.me/share/url?url=\( {encodeURIComponent(uniqueUrl)}&text= \){text}`, '_blank');
    }

    function copyLink() {
      if (!currentVideo) return;
      const baseUrl = window.location.href.split('?')[0];
      const uniqueUrl = `\( {baseUrl}?v= \){currentVideo.id || Date.now()}`;
      navigator.clipboard.writeText(uniqueUrl).then(() => {
        alert("✅ Link Copied!");
        closeShareSheet();
      });
    }

    let clickCount = 0;
    document.getElementById('header').addEventListener('click', () => {
      clickCount++;
      if (clickCount >= 5) {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminPassword').focus();
        clickCount = 0;
      }
    });

    window.checkPassword = () => {
      if (document.getElementById('adminPassword').value.trim() === ADMIN_PASSWORD) {
        document.getElementById('adminContent').style.display = 'block';
        document.getElementById('adminPassword').value = '';
        document.getElementById('telegramLinkInput').value = telegramJoinLink;
        renderCategorySelect();
        renderAdminCategoryList();
        renderAdminVideoList();
      } else {
        alert('❌ Wrong Password!');
      }
    };

    window.closeAdmin = () => {
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('adminContent').style.display = 'none';
    };

    window.addVideo = () => {
      const title = document.getElementById('newTitle').value.trim();
      const link = document.getElementById('newLink').value.trim();
      const thumb = document.getElementById('newThumb').value.trim() || 'https://picsum.photos/id/1015/600/340';
      const category = document.getElementById('newCategorySelect').value;

      if (title && link && category) {
        if (editingIndex >= 0) {
          videos[editingIndex] = { ...videos[editingIndex], title, link, thumb, category };
          editingIndex = -1;
        } else {
          videos.unshift({ 
            id: Date.now(), 
            title, 
            thumb, 
            link, 
            views: "0", 
            uploadTime: Date.now(), 
            likes: 0, 
            category 
          });
        }
        saveData();
        renderVideos();
        renderAdminVideoList();
        alert('✅ Video Saved!');
      } else {
        alert('Title, Link এবং Category দিতে হবে');
      }
    };

    window.addCategory = () => {
      const newCat = document.getElementById('newCategory').value.trim();
      if (newCat && !categories.includes(newCat)) {
        categories.push(newCat);
        saveData();
        renderCategoryBar();
        renderCategorySelect();
        renderAdminCategoryList();
        document.getElementById('newCategory').value = '';
        alert('✅ New Category Added!');
      }
    };

    window.deleteCategory = (index) => {
      if (confirm(`Delete "${categories[index]}"?`)) {
        categories.splice(index, 1);
        saveData();
        renderCategoryBar();
        renderCategorySelect();
        renderAdminCategoryList();
      }
    };

    function renderCategorySelect() {
      const select = document.getElementById('newCategorySelect');
      select.innerHTML = '';
      categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        select.appendChild(option);
      });
    }

    function renderAdminCategoryList() {
      const container = document.getElementById('adminCategoryList');
      container.innerHTML = '';
      categories.forEach((cat, i) => {
        const div = document.createElement('div');
        div.style.cssText = 'background:#1f1f1f;padding:12px;border-radius:8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;';
        div.innerHTML = `<strong>\( {cat}</strong><button onclick="deleteCategory( \){i})" style="background:#ff0000;color:#fff;border:none;padding:6px 12px;border-radius:6px;">Delete</button>`;
        container.appendChild(div);
      });
    }

    function renderAdminVideoList() {
      const container = document.getElementById('adminVideoList');
      container.innerHTML = '';
      videos.forEach((video, i) => {
        const div = document.createElement('div');
        div.style.cssText = 'background:#1f1f1f;padding:12px;border-radius:8px;margin-bottom:10px;';
        div.innerHTML = `
          <strong>${video.title}</strong><br>
          <small>Category: ${video.category}</small><br>
          <button onclick="editVideo(${i})" style="background:#0084FF;color:#fff;border:none;padding:8px 12px;margin-right:8px;border-radius:6px;">Edit</button>
          <button onclick="deleteVideo(${i})" style="background:#ff0000;color:#fff;border:none;padding:8px 12px;border-radius:6px;">Delete</button>
        `;
        container.appendChild(div);
      });
    }

    window.editVideo = (i) => {
      editingIndex = i;
      const v = videos[i];
      document.getElementById('newTitle').value = v.title;
      document.getElementById('newLink').value = v.link || '';
      document.getElementById('newThumb').value = v.thumb || '';
      document.getElementById('newCategorySelect').value = v.category;
    };

    window.deleteVideo = (i) => {
      if (confirm('Delete this video?')) {
        videos.splice(i, 1);
        saveData();
        renderVideos();
        renderAdminVideoList();
      }
    };

    function init() {
      loadUserProfile();
      renderCategoryBar();
      loadData();
      document.getElementById('telegramFloat').href = telegramJoinLink;
    }

    init();
  </script>
</body>
